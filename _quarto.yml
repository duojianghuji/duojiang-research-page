project:
  type: website

website:
  title: "Duojiang | Research"
  description: "Plant ecophysiology research exploring stress responses, hydraulics, and photosynthetic adaptation."
  search: true
  favicon: favicon.svg
  open-graph: true
  twitter-card: true
  site-url: "https://duojianghuji.github.io/duojiang-research-page/"
  repo-url: "https://github.com/duojianghuji/duojiang-research-page"
  navbar:
    background: light
    pinned: true
    collapse: true
    right:
      - href: index.qmd
        text: Home
      - research.qmd
      - publications.qmd
      - projects.qmd
      - resources.qmd
      - contact.qmd
  page-footer:
    left: "Duojiang"
    right: "Built with [Quarto](https://quarto.org). [Field Notes →](https://duojianghuji.github.io/duojiang-field-notes/)"

format:
  html:
    theme: flatly
    css: styles.css
    toc: false
    smooth-scroll: true
    grid:
      body-width: 960px
      margin-width: 220px
    mainfont: "Ubuntu"
    monofont: "Ubuntu Mono"

execute:
  freeze: auto
